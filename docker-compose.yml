services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: resaleos
      POSTGRES_USER: resaleos
      POSTGRES_PASSWORD: resaleos_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - resaleos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resaleos -d resaleos"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  resaleos_postgres_data:
